<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0B0FKP0KQW"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0B0FKP0KQW');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project — Suhas Tamvada</title>
    <meta name="description" content="A project by Suhas Tamvada.">

    <!-- Dark mode: apply saved theme before CSS loads to prevent flash -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
    <main class="one-page">
        <a href="/" class="back-link">&larr; Suhas Tamvada</a>

        <article id="project" class="project-detail">
            <p class="loading">Loading project...</p>
        </article>

        <footer>
            <p>&copy; 2026 Suhas Tamvada</p>
        </footer>
    </main>

    <script>
      (function() {
        var container = document.getElementById('project');
        var id = new URLSearchParams(window.location.search).get('id');

        function esc(s) {
          var d = document.createElement('div');
          d.textContent = s;
          return d.innerHTML;
        }

        function render(p) {
          document.title = p.name + ' — Suhas Tamvada';

          var imgs = p.images || [];
          var sliderHtml = '';
          if (imgs.length > 0) {
            sliderHtml =
              '<div class="slider">' +
                '<div class="slider-track" id="slider-track">' +
                imgs.map(function(src, i) {
                  return '<div class="slide"><img src="' + src + '" alt="' + esc(p.name) + ' — slide ' + (i + 1) + '" loading="lazy" onerror="this.closest(\'.slider\').style.display=\'none\'"></div>';
                }).join('') +
                '</div>' +
                (imgs.length > 1
                  ? '<button class="slider-btn prev" id="slider-prev" aria-label="Previous image">&larr;</button>' +
                    '<button class="slider-btn next" id="slider-next" aria-label="Next image">&rarr;</button>' +
                    '<div class="slider-dots" id="slider-dots">' +
                    imgs.map(function(_, i) {
                      return '<button class="dot' + (i === 0 ? ' active' : '') + '" data-i="' + i + '" aria-label="Go to image ' + (i + 1) + '"></button>';
                    }).join('') +
                    '</div>'
                  : '') +
              '</div>';
          }

          var techHtml = (p.tech || []).map(function(t) {
            return '<span class="tech-tag">' + esc(t) + '</span>';
          }).join('');

          var linksHtml = (p.papers || []).map(function(paper) {
            return '<a href="' + paper.url + '" class="project-link" target="_blank" rel="noopener">' + esc(paper.label) + '</a>';
          }).join('');
          if (p.github) {
            linksHtml += '<a href="' + p.github + '" class="project-link" target="_blank" rel="noopener">GitHub</a>';
          }

          container.innerHTML =
            '<div class="project-detail-header">' +
              '<p class="project-card-meta">' + esc(p.year || '') + '</p>' +
              '<h1>' + esc(p.name) + '</h1>' +
              '<div class="project-card-tech">' + techHtml + '</div>' +
            '</div>' +
            sliderHtml +
            '<p class="project-summary">' + esc(p.summary || '') + '</p>' +
            (linksHtml ? '<div class="project-card-links">' + linksHtml + '</div>' : '');

          if (imgs.length > 1) initSlider(imgs.length);
        }

        function initSlider(n) {
          var track = document.getElementById('slider-track');
          var dots = document.getElementById('slider-dots').querySelectorAll('.dot');
          var current = 0;

          function go(i) {
            current = (i + n) % n;
            track.scrollTo({ left: track.clientWidth * current, behavior: 'smooth' });
          }

          document.getElementById('slider-prev').addEventListener('click', function() { go(current - 1); });
          document.getElementById('slider-next').addEventListener('click', function() { go(current + 1); });
          dots.forEach(function(dot) {
            dot.addEventListener('click', function() { go(parseInt(dot.dataset.i, 10)); });
          });

          // Sync dots on manual swipe (scroll-snap)
          var timer;
          track.addEventListener('scroll', function() {
            clearTimeout(timer);
            timer = setTimeout(function() {
              current = Math.round(track.scrollLeft / track.clientWidth);
              dots.forEach(function(d, i) { d.classList.toggle('active', i === current); });
            }, 80);
          });
        }

        fetch('assets/projects.json')
          .then(function(r) {
            if (!r.ok) throw new Error('Failed to load');
            return r.json();
          })
          .then(function(projects) {
            var p = projects.find(function(x) { return x.id === id; });
            if (!p) {
              container.innerHTML = '<p class="empty-state">Project not found. <a href="/">Go home</a>.</p>';
              return;
            }
            render(p);
          })
          .catch(function() {
            container.innerHTML = '<p class="empty-state">Could not load project.</p>';
          });
      })();
    </script>
</body>
</html>
